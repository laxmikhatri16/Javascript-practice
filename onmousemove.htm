<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse move</title>
    <style>
        * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: Verdana, Geneva, Tahoma, sans-serif;

    }

    html,
    body {
        width: 100%;
        height: 100%;
        /* background-color: rgb(71, 58, 58); */
    }
    #main{
        position: absolute;
        width: 200px;
        height: 200px;
        background-color: red;
    }
    </style>
</head>
  
<body>
    <div id="main">

    </div>
    
    <script>
        let main =document.querySelector("#main");
        window.addEventListener("mousemove",function(evt){
            main.style.top =evt.clientY +"px";
            main.style.left =evt.clientX +"px";
        })
    </script>
</body>
</html>
